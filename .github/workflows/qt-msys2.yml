name: Build Static Qt 6.11 (MSYS2 / MinGW64)

on:
  workflow_dispatch:

env:
  QT_VERSION: 6.11.0
  FFMPEG_URL: ${{ secrets.ffmpeg_base_url }}/ffmpeg-libs-win64-static.tar.gz?$(get-date -f yyyyMMddHHmmss)
  OPENSSL_URL: https://example.com/openssl-static-win64/openssl-win64-static.tar.gz
  BUILD_DIR: C:/qt-build
  INSTALL_DIR: C:/qt-static
  DEPS_DIR: C:/deps

jobs:
  build:
    runs-on: windows-2022

    defaults:
      run:
        shell: msys2 {0}

    steps:
      # MSYS2 + minimal required toolchain
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            tar
            unzip
            p7zip
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-binutils
            mingw-w64-x86_64-make
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-python
            mingw-w64-x86_64-perl

      # Checkout Qt source only (shallow)
      - name: Clone Qt 6.11
        run: |
          mkdir -p /c/src
          cd /c/src
          git clone --branch v${QT_VERSION} --depth 1 https://code.qt.io/qt/qt5.git qt6
          cd qt6
          perl init-repository ^
            --module-subset=qtbase,qtdeclarative,qtmultimedia,qtimageformats,qtnetworkauth,qtsvg ^
            --depth 1

      # Download static FFmpeg + OpenSSL
      - name: Download dependencies
        run: |
          mkdir -p /c/deps
          cd /c/deps

          curl -L "${FFMPEG_URL}" -o ffmpeg.tar.gz
          tar -xzf ffmpeg.tar.gz

          #curl -L "${OPENSSL_URL}" -o openssl.tar.gz
          #tar -xzf openssl.tar.gz

          echo "Dependency layout:"
          ls -la /c/deps

      # Environment tuning for static + performance
      - name: Configure environment
        run: |
          echo "export DEPS_ROOT=/c/deps" >> ~/.bashrc
          echo "export PATH=/mingw64/bin:\$PATH" >> ~/.bashrc

          # Aggressive optimization
          echo 'export CFLAGS="-O3 -pipe -march=x86-64-v3 -flto=auto -ffunction-sections -fdata-sections"' >> ~/.bashrc
          echo 'export CXXFLAGS="-O3 -pipe -march=x86-64-v3 -flto=auto -ffunction-sections -fdata-sections"' >> ~/.bashrc
          echo 'export LDFLAGS="-static -static-libgcc -static-libstdc++ -Wl,--gc-sections -Wl,-s"' >> ~/.bashrc

      # Configure Qt
      - name: Configure Qt
        run: |
          source ~/.bashrc

          cd /c/src/qt6

          mkdir -p ${BUILD_DIR}
          cd ${BUILD_DIR}

          ../qt6/configure \
            -prefix ${INSTALL_DIR} \
            -release \
            -static \
            -static-runtime \
            -opensource \
            -confirm-license \
            -ltcg \
            -platform win32-g++ \
            -nomake tests \
            -nomake examples \
            -skip qt3d \
            -skip qt5compat \
            -skip qtactiveqt \
            -skip qtcharts \
            -skip qtcoap \
            -skip qtconnectivity \
            -skip qtdatavis3d \
            -skip qtdoc \
            -skip qtgrpc \
            -skip qthttpserver \
            -skip qtlanguageserver \
            -skip qtlocation \
            -skip qtlottie \
            -skip qtmqtt \
            -skip qtopcua \
            -skip qtpositioning \
            -skip qtquick3d \
            -skip qtquicktimeline \
            -skip qtremoteobjects \
            -skip qtscxml \
            -skip qtsensors \
            -skip qtserialbus \
            -skip qtserialport \
            -skip qtshadertools \
            -skip qtspeech \
            -skip qttools \
            -skip qttranslations \
            -skip qtvirtualkeyboard \
            -skip qtwayland \
            -skip qtwebchannel \
            -skip qtwebengine \
            -skip qtwebsockets \
            -skip qtwebview \
            -skip qtgraphs \
            -openssl-linked \
            -- \
            -DOPENSSL_USE_STATIC_LIBS=ON \
            -DFFMPEG_DIR=${DEPS_ROOT}/ffmpeg-libs-win64-static \
            -DQT_FEATURE_ffmpeg=ON \
            -DQT_FEATURE_openssl=ON \
            -DQT_FEATURE_opensslv30=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++

      # Build
      - name: Build Qt
        run: |
          source ~/.bashrc
          cd ${BUILD_DIR}
          cmake --build . --parallel $(nproc)

      # Install
      - name: Install Qt
        run: |
          source ~/.bashrc
          cd ${BUILD_DIR}
          cmake --install .

      # Compress output
      - name: Package Qt
        run: |
          cd /c
          tar -czf qt-6.11-static-msys2-win64.tar.gz qt-static

      # Upload
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qt-6.11-static-msys2-win64
          path: C:/qt-6.11-static-msys2-win64.tar.gz
